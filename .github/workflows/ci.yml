name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev make linux-tools-common
          sudo apt-get install -y "linux-tools-$(uname -r)" || sudo apt-get install -y linux-tools-azure || true
          if ! command -v bpftool >/dev/null 2>&1; then
            BPFT=$(find /usr/lib/linux-tools -type f -name bpftool | sort | tail -n1)
            if [ -z "$BPFT" ]; then
              echo "bpftool binary not found after installing linux-tools packages"
              exit 1
            fi
            sudo ln -sf "$BPFT" /usr/local/bin/bpftool
          fi
          bpftool version

      - name: Download modules
        run: go mod download

      - name: Generate BPF objects
        run: make generate

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: BPF self-test via bpftool
        run: sudo -E make test-bpf

      - name: BPF load test
        run: sudo -E make test-load
